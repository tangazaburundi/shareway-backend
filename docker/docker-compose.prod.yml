name: tangaza

services:
  mysql:
    image: mysql:8.2
    container_name: tangaza-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: shareway_db
      MYSQL_USER: shareway_user
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "3307:3306"
    volumes:
      - tangaza_mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "shareway_user", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - immo-net

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tangaza-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/shareway_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      DB_USERNAME: shareway_user
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:?MAIL_USERNAME is required}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?MAIL_PASSWORD is required}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
    ports:
      - "8083:8080"
    volumes:
      - tangaza_uploads:/app/uploads
      - tangaza_logs:/app/logs
    networks:
      - immo-net

volumes:
  tangaza_mysql_data:
  tangaza_uploads:
  tangaza_logs:

networks:
  immo-net:
    external: true
