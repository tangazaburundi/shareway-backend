spring:
  application:
    name: shareway-backend

  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  web:
    resources:
      add-mappings: false

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shareway_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:b09b99001@smtp-brevo.com}
    password: ${MAIL_PASSWORD:xsmtpsib-dcc3d92495547858ffd90e0fc083a45d3a785ec5f21707146897a28af6db67ae-mVQZEjZyTRbGM7aZ}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 3000
      mail.smtp.writetimeout: 5000
      mail.smtp.ssl.trust: smtp-relay.brevo.com

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8084}
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always

security:
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-key-change-in-production-minimum-256-bits}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  admin-jwt:
    secret: ${ADMIN_JWT_SECRET:dev-admin-secret-key-change-in-production-256-bits}
    expiration: ${ADMIN_JWT_EXPIRATION:86400000}
    refresh-expiration: ${ADMIN_JWT_REFRESH_EXPIRATION:604800000}

shareway:
  app:
    name: Shareway
    frontend-url: ${FRONTEND_URL:http://localhost:4200}
    backend-url: ${BACKEND_URL:http://localhost:8084}
    upload-dir: ${UPLOAD_DIR:./uploads}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  two-fa:
    issuer: Shareway
    digits: 6
    period: 30

app:
  mail-from: ${MAIL_FROM:lemarchebdi@gmail.com}

logging:
  level:
    com.shareway: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
  file:
    name: logs/shareway.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    try-it-out-enabled: true
    operations-sorter: method
