spring:
  application:
    name: shareway-backend

  web:
    resources:
      add-mappings: false   # désactive le ResourceHttpRequestHandler qui interceptait tout


  datasource:
    url: jdbc:mysql://localhost:3306/shareway_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    #username: ${DB_USERNAME:shareway_user}
    #password: ${DB_PASSWORD:shareway_pass}
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@shareway.bi}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.ssl.checkserveridentity: false
      mail.smtp.ssl.trust: "*"
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always

security:
  jwt:
    secret: ${JWT_SECRET:shareway-super-secret-key-change-in-production-minimum-256-bits}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

    # JWT Admin
  admin-jwt.secret: shareway-admin-secret-key-minimum-256-bits-pour-hs256-algorithm
  admin-jwt.expiration: 86400000
  admin-jwt.refresh-expiration: 604800000

shareway:
  app:
    name: Shareway
    frontend-url: ${FRONTEND_URL:http://localhost:4200}
    upload-dir: ${UPLOAD_DIR:./uploads}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  two-fa:
    issuer: Shareway
    digits: 6
    period: 30

logging:
  level:
    com.shareway: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
  file:
    name: logs/shareway.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    try-it-out-enabled: true
    operations-sorter: method
